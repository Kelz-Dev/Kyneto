version: '3.8'

services:
  # IPFS Node (Kubo)
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001" # P2P Swarm
      - "5001:5001" # API (Internal use)
      - "8080:8080" # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    restart: always

  # Kyneto Provider Node
  provider-node:
    build:
      context: ..
      dockerfile: provider-stack/Dockerfile.node
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - RPC_URL=${RPC_URL}
      - API_URL=${API_URL}
      - KUBO_API_URL=http://ipfs:5001
    depends_on:
      - ipfs
    restart: always

volumes:
  ipfs_data:
