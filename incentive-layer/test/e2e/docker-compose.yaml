services:
  # Database for indexing
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=incentive_layer
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - ../../config/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "user", "-d", "incentive_layer" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # IPFS Node
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
      - "8081:8080"
      - "4001:4001"

  # REST API Service
  api-server:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../../api/rest-api:/app
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - PORT=3000
    depends_on:
      - postgres
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"
    ports:
      - "3000:3000"

  # Blockchain Indexer Service
  indexer:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../../indexer:/app
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
    depends_on:
      - postgres
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"

  # Erasure Coding Service
  erasure-coding:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../../services/erasure-coding:/app
    environment:
      - KUBO_API_URL=http://ipfs:5001
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
      - PRIVATE_KEY=${PRIVATE_KEY}
    depends_on:
      - ipfs
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"

  # Dashboard Service
  dashboard:
    image: nginx:alpine
    volumes:
      - ../../dashboard:/usr/share/nginx/html
    ports:
      - "8080:80"
    depends_on:
      - api-server
