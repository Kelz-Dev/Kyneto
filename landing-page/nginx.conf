server {
    listen 80 default_server;
    server_name kyneto.app www.kyneto.app;
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kyneto.app www.kyneto.app;

    # Use Docker's embedded DNS server to resolve upstreams dynamically
    resolver 127.0.0.11 valid=30s;

    # Certbot will populate these paths
    ssl_certificate /etc/letsencrypt/live/kyneto.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kyneto.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }

    location /api/ {
        set $api_upstream http://api-server:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        set $socket_upstream http://api-server:3000;
        proxy_pass $socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /dashboard/ {
        set $dashboard_upstream http://incentive-dashboard:80;
        proxy_pass $dashboard_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect /dashboard to /dashboard/ (trailing slash)
    location = /dashboard {
        return 301 $scheme://$http_host/dashboard/;
    }

    location /ml/ {
        set $ml_upstream http://ml-sidecar:5050;
        proxy_pass $ml_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        set $grafana_upstream http://grafana:3000;
        proxy_pass $grafana_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

