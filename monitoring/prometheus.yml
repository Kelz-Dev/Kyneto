global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-server'
    metrics_path: /metrics
    static_configs:
      - targets: ['api-server:3000']

  - job_name: 'ml-sidecar'
    metrics_path: /metrics
    static_configs:
      - targets: ['ml-sidecar:5050']

  - job_name: 'indexer'
    metrics_path: /metrics
    static_configs:
      - targets: ['indexer:9100']
