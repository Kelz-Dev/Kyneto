version: '3.8'

services:
  # ===========================================
  # IPFS / Kubo Node
  # ===========================================
  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    volumes:
      - ipfs_path:/data/ipfs
      - ipfs_fuse:/ipfs
      - ipns_fuse:/ipns
    environment:
      - IPFS_PATH=/data/ipfs
    ports:
      - "4002:4001" # P2P Swarm
      - "5002:5001" # API
      - "8081:8080" # Gateway

  # ===========================================
  # Kyneto Landing Page (Port 3001)
  # ===========================================
  landing-page:
    image: ghcr.io/kelz-dev/kubo-master/landing-page:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Port 3003 removed as it is now handled via /dashboard on port 443
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=incentive_layer
      - POSTGRES_USER=kyneto_user
      - POSTGRES_PASSWORD=your_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./incentive-layer/config/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "kyneto_user", "-d", "incentive_layer" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # Incentive Layer REST API (Port 3002)
  # ===========================================
  api-server:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/api/rest-api:/app
    environment:
      - DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3002:3000"

  # ===========================================
  # Blockchain Indexer Service
  # ===========================================
  blockchain-indexer:
    image: "node:20-alpine"
    container_name: kyneto-indexer-1
    working_dir: /app
    restart: always
    volumes:
      - ./incentive-layer/indexer:/app
    environment:
      - DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run build && npm start"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Blockchain Event Listener (Sync to DB)
  # ===========================================
  blockchain-listener:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/services/blockchain-listener:/app
    environment:
      - DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - REGISTRY_ADDRESS=${REGISTRY_CONTRACT}
      - PLEDGES_ADDRESS=${PLEDGES_CONTRACT}
      - MARKETPLACE_ADDRESS=${MARKETPLACE_CONTRACT}
      - PROVER_ADDRESS=${PROOF_VERIFIER_CONTRACT}
      - SLASHING_ADDRESS=${SLASHING_MANAGER_CONTRACT}
      - PAYMENTS_ADDRESS=${PAYMENTS_CONTRACT}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  # ===========================================
  # Erasure Coding Service
  # ===========================================
  erasure-coding:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/services/erasure-coding:/app
    environment:
      - KUBO_API_URL=http://ipfs:5001
      - DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
      - PRIVATE_KEY=${PRIVATE_KEY}
    depends_on:
      - ipfs
      - postgres
    command: sh -c "npm install && npm run build && npm start"

  # ===========================================
  # Incentive Layer Dashboard (Port 3003)
  # ===========================================
  incentive-dashboard:
    image: nginx:1.24-alpine
    restart: unless-stopped
    volumes:
      - ./incentive-layer/dashboard:/usr/share/nginx/html:ro
    # Remove external port mapping to route via Nginx SSL
    # ports:
    #   - "3003:80"
    depends_on:
      - api-server

  # ===========================================
  # ML Sidecar (Predictive Analytics API)
  # ===========================================
  sidecar-ml:
    image: ghcr.io/kelz-dev/kubo-master/ml-sidecar:latest
    container_name: kyneto-ml-sidecar-1
    restart: always
    environment:
      - DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer
    depends_on:
      - api-server
      - postgres

  # ===========================================
  # Prometheus (Metrics Collection)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Internal only — not exposed to the internet

    # ===========================================
    # Grafana (Monitoring Dashboard)
    # ===========================================
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://kyneto.app/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  ipfs_path:
  ipfs_fuse:
  ipns_fuse:
  postgres_data:
  prometheus_data:
  grafana_data:
