version: '3.8'

services:
  # ===========================================
  # IPFS / Kubo Node
  # ===========================================
  ipfs:
    build: .
    restart: unless-stopped
    volumes:
      - ipfs_path:/data/ipfs
      - ipfs_fuse:/ipfs
      - ipns_fuse:/ipns
    environment:
      - IPFS_PATH=/data/ipfs
    ports:
      - 4001:4001/tcp
      - 4001:4001/udp
      - 127.0.0.1:5001:5001
      - 127.0.0.1:8080:8080

  # ===========================================
  # Kyneto Landing Page
  # ===========================================
  landing-page:
    build:
      context: ./Landing Page
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=incentive_layer
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./incentive-layer/config/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "user", "-d", "incentive_layer" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # Incentive Layer REST API
  # ===========================================
  api-server:
    image: node:18-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/api/rest-api:/app
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"
    ports:
      - "3002:3000"

  # ===========================================
  # Blockchain Indexer Service
  # ===========================================
  indexer:
    image: node:18-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/indexer:/app
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Erasure Coding Service
  # ===========================================
  erasure-coding:
    image: node:18-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./incentive-layer/services/erasure-coding:/app
    environment:
      - KUBO_API_URL=http://ipfs:5001
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
      - RPC_URL=https://rpc-amoy.polygon.technology
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
      - PRIVATE_KEY=${PRIVATE_KEY}
    depends_on:
      - ipfs
      - postgres
    command: sh -c "[ -d node_modules ] || npm install; npm run dev"

  # ===========================================
  # Incentive Layer Dashboard
  # ===========================================
  incentive-dashboard:
    build:
      context: ./incentive-layer/dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./incentive-layer/dashboard:/usr/share/nginx/html:ro
    ports:
      - "3003:80"
    depends_on:
      - api-server

  # ===========================================
  # ML Sidecar (Predictive Analytics API)
  # ===========================================
  ml-sidecar:
    build:
      context: ./Machine_Learning_sidecar
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/incentive_layer
    depends_on:
      - api-server
      - postgres

  # ===========================================
  # Prometheus (Metrics Collection)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ===========================================
  # Grafana (Monitoring Dashboard)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:3004/
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3004:3000"
    depends_on:
      - prometheus

volumes:
  ipfs_path:
  ipfs_fuse:
  ipns_fuse:
  postgres_data:
  prometheus_data:
  grafana_data:
