name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Navigate to project directory
          cd ~/kyneto
          
          # Pull latest changes
          git pull origin main
          
          # Create .env file for Docker Compose
          echo "POSTGRES_USER=kyneto_user" > .env
          echo "POSTGRES_PASSWORD=your_secure_password" >> .env
          echo "POSTGRES_DB=incentive_layer" >> .env
          echo "PORT=3000" >> .env
          echo "DATABASE_URL=postgresql://kyneto_user:your_secure_password@postgres:5432/incentive_layer" >> .env
          
          # Build and Start Containers using Production File
          docker-compose -f docker-compose.prod.yaml up -d --build
          
          # Prune unused images to save space
          docker system prune -f
          
          echo "Deployment complete!"
