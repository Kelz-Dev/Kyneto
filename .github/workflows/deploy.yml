name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        envs: GITHUB_TOKEN
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Navigate to project directory (or create if missing)
          mkdir -p ~/kyneto
          cd ~/kyneto
          
          # Save existing remote URL if present, otherwise fallback to HTTPS with Token
          REMOTE_URL=$(git config --get remote.origin.url || echo "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git")
          echo "Using remote URL: $REMOTE_URL"
          
          # Clean up old git state to ensure fresh start
          rm -rf .git
          git init
          git remote add origin "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git fetch origin main
          git reset --hard origin/main
          
          # Remove untracked files (including nested .git folders)
          git clean -fdx
          
          # Create .env file for Docker Compose
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'kyneto_user' }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
          echo "PORT=3000" >> .env
          echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'kyneto_user' }}:${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}@postgres:5432/${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
          echo "MARKETPLACE_ADDRESS=${{ secrets.MARKETPLACE_ADDRESS }}" >> .env
          echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> .env
          echo "RPC_URL=https://rpc-amoy.polygon.technology" >> .env
          
          # Build and Start Containers using Production File
          docker compose -f docker-compose.prod.yaml up -d --build
          
          # Prune unused images to save space
          docker system prune -f
          
          echo "Deployment complete!"
