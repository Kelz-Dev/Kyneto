name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kelz-dev/kubo-master

jobs:
  # =============================================
  # Job 1: Build Docker images and push to GHCR
  # =============================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Landing Page
      uses: docker/build-push-action@v5
      continue-on-error: true
      with:
        context: ./landing-page
        file: ./landing-page/Dockerfile
        push: true
        tags: ${{ env.IMAGE_PREFIX }}/landing-page:latest,${{ env.IMAGE_PREFIX }}/landing-page:${{ github.sha }}
        cache-from: type=gha,scope=landing-page
        cache-to: type=gha,mode=max,scope=landing-page

    - name: Build and push Incentive Dashboard
      uses: docker/build-push-action@v5
      continue-on-error: true
      with:
        context: ./incentive-layer/dashboard
        file: ./incentive-layer/dashboard/Dockerfile
        push: true
        tags: ${{ env.IMAGE_PREFIX }}/incentive-dashboard:latest,${{ env.IMAGE_PREFIX }}/incentive-dashboard:${{ github.sha }}
        cache-from: type=gha,scope=incentive-dashboard
        cache-to: type=gha,mode=max,scope=incentive-dashboard

    - name: Build and push ML Sidecar
      uses: docker/build-push-action@v5
      continue-on-error: true
      with:
        context: ./Machine_Learning_sidecar
        file: ./Machine_Learning_sidecar/Dockerfile
        push: true
        tags: ${{ env.IMAGE_PREFIX }}/ml-sidecar:latest,${{ env.IMAGE_PREFIX }}/ml-sidecar:${{ github.sha }}
        cache-from: type=gha,scope=ml-sidecar
        cache-to: type=gha,mode=max,scope=ml-sidecar

  # =============================================
  # Job 2: Deploy to EC2 (ALWAYS runs, even if build fails)
  # =============================================
  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create .env file
      run: |
        echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'kyneto_user' }}" > .env
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}" >> .env
        echo "POSTGRES_DB=${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "PORT=3000" >> .env
        echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'kyneto_user' }}:${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}@postgres:5432/${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "MARKETPLACE_ADDRESS=${{ secrets.MARKETPLACE_ADDRESS }}" >> .env
        echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> .env
        echo "RPC_URL=https://rpc-amoy.polygon.technology" >> .env
        echo "REGISTRY_CONTRACT=${{ secrets.REGISTRY_CONTRACT || '0x2Cc10CdCbF9D2b7b6b8AcE8b607d8652772075Dd' }}" >> .env
        echo "PLEDGES_CONTRACT=${{ secrets.PLEDGES_CONTRACT || '0x2E158F19704B8A1C0D00CE562c2E3ee923e235E5' }}" >> .env
        echo "MARKETPLACE_CONTRACT=${{ secrets.MARKETPLACE_CONTRACT || '0x242545610D645Ac3526c7c9b3866Ccc66e333322' }}" >> .env
        echo "PROOF_VERIFIER_CONTRACT=${{ secrets.PROOF_VERIFIER_CONTRACT || '0xfac091c63921709A7F5375aA465Bba42E5755695' }}" >> .env
        echo "SLASHING_MANAGER_CONTRACT=${{ secrets.SLASHING_MANAGER_CONTRACT || '0x0f4927b287b441af412019636887847A8639D17C' }}" >> .env
        echo "PAYMENTS_CONTRACT=${{ secrets.PAYMENTS_CONTRACT || '0x78F97B5E5f270d2c83d2e0bbb98ac00784E53a1F' }}" >> .env

    - name: Fix permissions before copy
      uses: appleboy/ssh-action@master
      continue-on-error: true
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} kyneto || true

    - name: Copy files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yaml,incentive-layer,Machine_Learning_sidecar,monitoring,.env"
        target: "kyneto"
        rm: false

    - name: Pull images and deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 15m
        script: |
          set -e
          # Setup swap if needed
          if [ ! -f /swapfile ] || [ $(stat -c%s /swapfile) -lt 4000000000 ]; then
            echo "Setting up 4GB swap file..."
            sudo swapoff /swapfile || true
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            if ! grep -q "/swapfile" /etc/fstab; then
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
          fi

          # Install Docker if missing
          if ! [ -x "$(command -v docker)" ]; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker ${{ secrets.EC2_USERNAME }}
          fi
          
          # Install Certbot and setup SSL
          sudo apt-get update && sudo apt-get install -y certbot
          if [ ! -d "/etc/letsencrypt/live/kyneto.app" ]; then
            echo "Generating fallback self-signed certificate..."
            sudo mkdir -p /etc/letsencrypt/live/kyneto.app
            sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout /etc/letsencrypt/live/kyneto.app/privkey.pem \
              -out /etc/letsencrypt/live/kyneto.app/fullchain.pem \
              -subj "/C=US/ST=State/L=City/O=Organization/CN=kyneto.app"
          fi

          cd kyneto

          # Remove old 'Landing Page' directory if it still exists
          if [ -d "Landing Page" ]; then
            rm -rf "Landing Page"
          fi

          # Login to GHCR on the server (private repo)
          echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull pre-built images (ignore failures for images that didn't build)
          echo "Pulling pre-built images from GHCR..."
          sudo docker pull ghcr.io/kelz-dev/kubo-master/landing-page:latest || true
          sudo docker pull ghcr.io/kelz-dev/kubo-master/incentive-dashboard:latest || true
          sudo docker pull ghcr.io/kelz-dev/kubo-master/ml-sidecar:latest || true

          # Deploy everything (no --build needed!)
          echo "Starting all services..."
          sudo docker compose -f docker-compose.prod.yaml up -d

          # Force restart services that use volume mounts so they pick up new files
          echo "Restarting services to pick up code changes..."
          sudo docker compose -f docker-compose.prod.yaml restart api-server
          sudo docker compose -f docker-compose.prod.yaml restart incentive-dashboard

          sudo docker system prune -f
          echo "Deployment complete!"
