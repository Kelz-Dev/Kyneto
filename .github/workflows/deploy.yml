name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create .env file
      run: |
        echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'kyneto_user' }}" > .env
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}" >> .env
        echo "POSTGRES_DB=${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "PORT=3000" >> .env
        echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'kyneto_user' }}:${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}@postgres:5432/${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "MARKETPLACE_ADDRESS=${{ secrets.MARKETPLACE_ADDRESS }}" >> .env
        echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> .env
        echo "RPC_URL=https://rpc-amoy.polygon.technology" >> .env

    - name: Copy files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yaml,Landing Page,Kyneto Landing Page,incentive-layer,.env"
        target: "kyneto"
        rm: false

    - name: Start Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Setup/Resize swap space (4GB)
          if [ ! -f /swapfile ] || [ $(stat -c%s /swapfile) -lt 4000000000 ]; then
            echo "Setting up/Resizing to 4GB swap file..."
            sudo swapoff /swapfile || true
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            if ! grep -q "/swapfile" /etc/fstab; then
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
          fi

          # Install Docker and Docker Compose if missing
          if ! [ -x "$(command -v docker)" ]; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker ${{ secrets.EC2_USERNAME }}
          fi
          
          # Install Certbot and setup SSL
          sudo apt-get update && sudo apt-get install -y certbot
          if [ ! -d "/etc/letsencrypt/live/kyneto.app" ]; then
            echo "Generating fallback self-signed certificate..."
            sudo mkdir -p /etc/letsencrypt/live/kyneto.app
            sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout /etc/letsencrypt/live/kyneto.app/privkey.pem \
              -out /etc/letsencrypt/live/kyneto.app/fullchain.pem \
              -subj "/C=US/ST=State/L=City/O=Organization/CN=kyneto.app"
          fi

          cd kyneto
          # Use docker-compose (v1) with hyphen since the server doesn't have the compose plugin
          sudo docker-compose -f docker-compose.prod.yaml up -d --build
          sudo docker-compose -f docker-compose.prod.yaml restart landing-page # Ensure Nginx picks up SSL
          sudo docker system prune -f
          echo "Deployment complete!"
