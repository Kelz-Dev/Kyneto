name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create .env file
      run: |
        echo "POSTGRES_USER=${{ secrets.POSTGRES_USER || 'kyneto_user' }}" > .env
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}" >> .env
        echo "POSTGRES_DB=${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "PORT=3000" >> .env
        echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER || 'kyneto_user' }}:${{ secrets.POSTGRES_PASSWORD || 'your_secure_password' }}@postgres:5432/${{ secrets.POSTGRES_DB || 'incentive_layer' }}" >> .env
        echo "MARKETPLACE_ADDRESS=${{ secrets.MARKETPLACE_ADDRESS }}" >> .env
        echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> .env
        echo "RPC_URL=https://rpc-amoy.polygon.technology" >> .env

    - name: Copy files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yaml,Landing Page,incentive-layer"
        target: "kyneto"
        rm: true

    - name: Start Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Setup swap space (2GB) if it doesn't exist
          if [ ! -f /swapfile ]; then
            echo "Setting up 2GB swap file..."
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi

          # Install Docker and Docker Compose if missing
          if ! [ -x "$(command -v docker)" ]; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker ${{ secrets.EC2_USERNAME }}
          fi
          
          cd kyneto
          # Use sudo for docker commands to avoid permission issues on first run
          sudo docker compose -f docker-compose.prod.yaml up -d --build
          sudo docker system prune -f
          echo "Deployment complete!"
